name: Initial_Copy_No_Fork

on: 
  workflow_dispatch: # Позволяет запустить копирование кнопкой

jobs:
  copy-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Your Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone Original Craft
        run: |
          # Клонируем оригинал во временную папку
          git clone https://github.com/fogleman/Craft.git temp_source
          
          # Удаляем историю оригинала, чтобы не было связи (чистый старт)
          rm -rf temp_source/.git
          
          # Переносим файлы в текущий репозиторий
          cp -rv temp_source/* .
          cp -rv temp_source/.[!.]* . || true
          rm -rf temp_source

      - name: Commit and Push
        run: |
          git config --global user.name "VoxelEngineBot"
          git config --global user.email "bot@voxel.com"
          git add .
          git commit -m "Initial clean copy from source (v1.0.0)"
          git push origin main --force
